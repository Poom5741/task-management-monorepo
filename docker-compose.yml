version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tdg-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-tdguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tdgpassword}
      POSTGRES_DB: ${DB_NAME:-tdgdb}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tdguser} -d ${DB_NAME:-tdgdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tdg-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: